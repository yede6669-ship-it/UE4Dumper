name: Build UE4Dumper

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允许在 GitHub 页面手动触发构建

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 JDK 环境（Android SDK/NDK 环境通常需要）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. 安装并配置 Android NDK
      # 这里使用 GitHub 虚拟环境自带的 NDK 版本（例如 r25c 或 r26b），无需额外下载，速度极快
      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
        # 注意：如果该老旧项目对 NDK 版本有严格要求（如必须 r21b），
        # 可以取消下方两行的注释来指定版本：
        # with:
        #   ndk-version: '21.4.7075529' 

      # 4. 执行 ndk-build 进行编译
      # GitHub Actions 的 Ubuntu 环境中，$ANDROID_NDK_ROOT 变量已自动配置好
      - name: Build with ndk-build
        run: |
          $ANDROID_NDK_ROOT/ndk-build

      # 5. 上传构建生成的二进制文件到 GitHub Artifacts
      # 编译产物会按照指南提示，保存在项目根目录的 libs 文件夹中
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: UE4Dumper-binaries
          path: libs/
